[build-system]
requires = ["setuptools>=61.0"]
build-backend = "setuptools.build_meta"

[project]
name = "simview"
version = "2.5"
readme = "README.md"
requires-python = ">=3.10"
authors = [
    { name = "Ales Kucera", email = "kuceral@fel.cvut.cz" },
    { name = "David Korcak", email = "david.korcak@gmail.com" },
    { name = "Jan Vlk", email = "vlkjan6@fel.cvut.cz" },
]
description = "THREE.js-based simulation visualization tool"
dependencies = [
    "einops",
    "fastapi>=0.135.3",
    "httptools>=0.7.1",
    "jinja2>=3.1.6",
    "orjson>=3.11.8",
    "python-socketio>=5.16.1",
    "uvicorn>=0.44.0",
    "uvloop>=0.22.1",
]

[project.scripts]
simview = "simview.__main__:main"

[tool.setuptools.package-dir]
simview = "simview"
